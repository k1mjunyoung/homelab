server {
    listen 80;
    server_name jigu.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.jigu.dev$request_uri;
    }
}

server {
    listen 80;
    server_name www.jigu.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name jigu.dev;

    ssl_certificate /etc/letsencrypt/live/jigu.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jigu.dev/privkey.pem;

    location / {
        return 301 https://www.jigu.dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.jigu.dev;

    ssl_certificate /etc/letsencrypt/live/jigu.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jigu.dev/privkey.pem;

    location / {
        proxy_pass http://jigu-core:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# ──────────────────────────────────────────────
# supa.jigu.dev → supabase-kong:8000
# DNS: CNAME supa → jigu.dev (Cloudflare Proxied)
# ──────────────────────────────────────────────

server {
    listen 80;
    server_name supa.jigu.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name supa.jigu.dev;

    ssl_certificate /etc/letsencrypt/live/supa.jigu.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supa.jigu.dev/privkey.pem;

    # Kong이 큰 헤더(JWT 등)를 반환하므로 버퍼 크기 확대
    proxy_buffer_size 160k;
    proxy_buffers 64 160k;
    proxy_busy_buffers_size 320k;

    # Docker 내부 DNS - 컨테이너 시작 순서와 무관하게 동적 해석
    resolver 127.0.0.11 valid=30s;
    set $supabase_backend http://supabase-kong:8000;

    location / {
        proxy_pass $supabase_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 지원 (Realtime 기능)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }
}


