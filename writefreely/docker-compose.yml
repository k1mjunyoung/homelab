services:
  db:
    image: mariadb:10.5
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_root_password
      MYSQL_DATABASE: writefreely
      MYSQL_USER: wf_user
      MYSQL_PASSWORD: wf_password
    volumes:
      - ./db_data:/var/lib/mysql

  web:
    image: writeas/writefreely
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./:/writefreely
    # 이 부분이 핵심입니다: 컨테이너가 /writefreely 폴더 안에서 명령을 실행하게 합니다.
    working_dir: /writefreely
    depends_on:
      - db